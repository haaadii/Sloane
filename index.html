<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLOANE | NEURAL INTERFACE</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #00ffc3; --dark: #050505; --panel: rgba(10, 15, 15, 0.9); }
        body, html { margin: 0; padding: 0; background: var(--dark); color: var(--glow); font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }
        
        /* Background Grid */
        body::before { content: ""; position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 255, 195, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 195, 0.05) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }

        #app { display: grid; grid-template-columns: 1fr 350px; height: 100vh; padding: 10px; gap: 10px; box-sizing: border-box; }
        
        /* Camera Viewport */
        .viewport { position: relative; border: 1px solid var(--glow); background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(0.5) contrast(1.2) brightness(0.8); }
        canvas { position: absolute; top: 0; left: 0; }
        .scanline { position: absolute; width: 100%; height: 2px; background: rgba(0, 255, 195, 0.5); box-shadow: 0 0 15px var(--glow); top: 0; animation: scan 3s linear infinite; z-index: 10; }

        /* Sidebar UI */
        .sidebar { background: var(--panel); border: 1px solid var(--glow); padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; text-transform: uppercase; font-size: 0.8rem; }
        .status-bar { border-bottom: 1px solid var(--glow); padding-bottom: 10px; font-weight: 800; letter-spacing: 2px; }
        
        input, select { background: transparent; border: 1px solid #333; color: var(--glow); padding: 10px; font-family: inherit; margin-top: 5px; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--glow); outline: none; }
        button { background: var(--glow); color: #000; border: none; padding: 12px; cursor: pointer; font-weight: 800; transition: 0.3s; margin-top: 10px; width: 100%; }
        button:hover { background: #fff; box-shadow: 0 0 20px var(--glow); }

        .hidden { display: none !important; }
        .profile-card { border: 1px solid #333; padding: 10px; margin-top: 10px; background: rgba(0,255,195,0.05); }
        .profile-card b { color: #fff; }

        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<div id="auth-screen" style="position:fixed; inset:0; background:var(--dark); z-index:100; display:flex; align-items:center; justify-content:center; flex-direction:column;">
    <h1 style="letter-spacing:10px; font-weight:800;">SLOANE <span style="font-size:0.5rem; vertical-align:middle;">V.1.0</span></h1>
    <div style="width:300px;">
        <input type="text" id="login-email" placeholder="ADMIN_ID">
        <input type="password" id="login-pw" placeholder="SECRET_PASS">
        <button onclick="handleLogin()">ACCESS SYSTEM</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="viewport">
        <div class="scanline"></div>
        <video id="video" autoplay muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="sidebar">
        <div class="status-bar">SYSTEM_STATUS: <span id="sys-status">LOADING_IA...</span></div>
        
        <div id="detection-info">
            <p>> TARGET_IDENTIFICATION:</p>
            <div id="user-data" class="profile-card">SEARCHING...</div>
        </div>

        <hr style="border:0; border-top:1px solid #333; width:100%;">

        <div id="admin-panel">
            <p>> CREATE_NEW_PROFILE</p>
            <input type="text" id="f-name" placeholder="PRENOM">
            <input type="text" id="l-name" placeholder="NOM">
            <input type="date" id="dob" placeholder="DATE_NAISSANCE">
            <input type="text" id="p-birth" placeholder="PAYS_NAISSANCE">
            <input type="text" id="p-res" placeholder="PAYS_RESIDENCE">
            <button onclick="registerFace()">ENREGISTRER EMPREINTE</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "TON_API_KEY",
        authDomain: "TON_PROJET.firebaseapp.com",
        projectId: "TON_PROJET",
        storageBucket: "TON_PROJET.appspot.com",
        messagingSenderId: "ID",
        appId: "APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay');
    let labeledDescriptors = [];

    // Connexion
    window.handleLogin = async () => {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pw').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            startSystem();
        } catch (e) { alert("ACCESS_DENIED"); }
    };

    async function startSystem() {
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
        await Promise.all([
            faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);
        
        document.getElementById('sys-status').innerText = "ONLINE";
        navigator.mediaDevices.getUserMedia({ video: {} }).then(stream => video.srcObject = stream);
        
        loadProfiles();
        setInterval(detect, 1000);
    }

    async function loadProfiles() {
        const querySnapshot = await getDocs(collection(db, "profiles"));
        labeledDescriptors = querySnapshot.docs.map(doc => {
            const data = doc.data();
            return new faceapi.LabeledFaceDescriptors(data.id, [new Float32Array(data.descriptor)]);
        });
    }

    async function detect() {
        if (labeledDescriptors.length === 0) return;
        const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
        faceapi.matchDimensions(canvas, displaySize);

        const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
        const resizedDetections = faceapi.resizeResults(detections, displaySize);
        
        const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
        const results = resizedDetections.map(d => faceMatcher.findBestMatch(d.descriptor));

        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        results.forEach((result, i) => {
            const box = resizedDetections[i].detection.box;
            const drawBox = new faceapi.draw.DrawBox(box, { label: result.toString(), boxColor: '#00ffc3' });
            drawBox.draw(canvas);
            
            if (result.label !== 'unknown') fetchDetails(result.label);
        });
    }

    async function fetchDetails(id) {
        const querySnapshot = await getDocs(collection(db, "profiles"));
        querySnapshot.forEach(doc => {
            if (doc.data().id === id) {
                const d = doc.data();
                document.getElementById('user-data').innerHTML = `
                    <b>ID:</b> ${d.id}<br>
                    <b>NOM:</b> ${d.prenom} ${d.nom}<br>
                    <b>NÉ LE:</b> ${d.dob}<br>
                    <b>ORIGINE:</b> ${d.paysNais}<br>
                    <b>RESIDENCE:</b> ${d.paysHab}
                `;
            }
        });
    }

    window.registerFace = async () => {
        const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
        if (!detection) return alert("AUCUN VISAGE DÉTECTÉ");

        const id = "SLN-" + Math.floor(Math.random()*9999);
        const profile = {
            id: id,
            prenom: document.getElementById('f-name').value,
            nom: document.getElementById('l-name').value,
            dob: document.getElementById('dob').value,
            paysNais: document.getElementById('p-birth').value,
            paysHab: document.getElementById('p-res').value,
            descriptor: Array.from(detection.descriptor)
        };

        await addDoc(collection(db, "profiles"), profile);
        alert("PROFIL ENREGISTRÉ : " + id);
        loadProfiles();
    };
</script>
</body>
</html>
