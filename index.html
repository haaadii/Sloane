<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SLOANE | Strategic Intelligence Platform</title>
    <style>
        :root {
            --bg-primary: #090a0b;
            --bg-secondary: #111418;
            --accent: #e0e0e0;
            --text-main: #a0a6ad;
            --text-bright: #ffffff;
            --border: #2d3139;
            --highlight: #3d444d;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Style Palantir */
        .sidebar {
            width: 240px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            color: var(--text-bright);
            font-weight: 700;
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .nav-item {
            padding: 12px 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-bottom: 1px solid transparent;
            transition: 0.2s;
        }

        .nav-item:hover { color: var(--text-bright); border-bottom-color: var(--highlight); }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .workspace-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h2 { color: var(--text-bright); font-weight: 400; font-size: 1.5rem; margin: 0; }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .panel {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 2px;
        }

        /* Module Restoration */
        .drop-zone {
            border: 1px solid var(--border);
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            cursor: pointer;
            transition: 0.3s;
        }

        .drop-zone:hover { border-color: var(--accent); }

        #preview { max-width: 100%; max-height: 100%; display: none; filter: grayscale(100%); transition: 0.5s; }
        #preview:hover { filter: grayscale(0%); }

        .btn-action {
            background-color: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 12px 24px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        /* Console Style Palantir */
        .intelligence-feed {
            font-family: 'SF Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-main);
            height: 400px;
            overflow-y: auto;
        }

        .feed-entry {
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 2px solid var(--highlight);
        }

        input {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-bright);
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .timestamp { color: var(--highlight); margin-right: 10px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">SLOANE</div>
    <div class="nav-item">Object Explorer</div>
    <div class="nav-item">Image Intelligence</div>
    <div class="nav-item">Network Audit</div>
    <div class="nav-item">Settings</div>
</aside>

<main class="main-content">
    <div class="workspace-header">
        <h2>Intelligence Workspace / Image_Analysis_01</h2>
    </div>

    <div class="grid">
        <div class="panel">
            <div style="font-size: 0.7rem; margin-bottom: 10px; color: var(--highlight);">MODULE: NEURAL_RESTORATION_V4</div>
            <div class="drop-zone" id="dropZone">
                <span id="label">DRAG & DROP SOURCE MATERIAL</span>
                <input type="file" id="fileInput" hidden>
                <img id="preview">
            </div>
            <button class="btn-action" onclick="runInference()">Execute Inference</button>
        </div>

        <div class="panel">
            <div style="font-size: 0.7rem; margin-bottom: 10px; color: var(--highlight);">INTEL_FEED</div>
            <div class="intelligence-feed" id="feed">
                <div class="feed-entry"><span class="timestamp">13:04:22</span> System initialized. Waiting for input...</div>
            </div>
        </div>
    </div>

    <div class="panel" style="margin-top: 30px;">
        <div style="font-size: 0.7rem; margin-bottom: 10px; color: var(--highlight);">MODULE: OSINT_TARGET_RECON</div>
        <input type="text" id="target" placeholder="IDENTIFIER (NAME, ALIAS, UID)...">
        <div style="display: flex; gap: 10px;">
            <button class="btn-action" style="background: transparent; color: var(--accent); border: 1px solid var(--border);" onclick="intel('web')">Web Recon</button>
            <button class="btn-action" style="background: transparent; color: var(--accent); border: 1px solid var(--border);" onclick="intel('social')">Social Graph</button>
        </div>
    </div>
</main>

<script>
    const feed = document.getElementById('feed');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const label = document.getElementById('label');

    function pushFeed(msg) {
        const time = new Date().toLocaleTimeString();
        feed.innerHTML = `<div class="feed-entry"><span class="timestamp">${time}</span> ${msg}</div>` + feed.innerHTML;
    }

    document.getElementById('dropZone').onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                preview.src = event.target.result;
                preview.style.display = 'block';
                label.style.display = 'none';
                pushFeed(`Source file ingested: ${file.name}`);
            };
            reader.readAsDataURL(file);
        }
    };

    function runInference() {
        pushFeed("Connecting to remote neural engine...");
        setTimeout(() => pushFeed("Error: API_AUTHENTICATION_FAILED. Check credentials."), 1200);
    }

    function intel(type) {
        const query = document.getElementById('target').value;
        if (!query) return pushFeed("Warning: Null identifier provided.");
        pushFeed(`Querying ${type.toUpperCase()} databases for: ${query}`);
        window.open(`https://www.google.com/search?q="${query}"`, '_blank');
    }
</script>

</body>
</html>
