<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SLOANE | Tactical Intelligence Suite</title>
    <style>
        :root {
            --bg: #050607; --panel: #0d0f12; --accent: #ffffff;
            --text: #7f8c8d; --text-bright: #e0e0e0; --border: #1c1f24;
            --danger: #ff4444;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; display: flex; height: 100vh; font-size: 13px;
        }

        /* Navigation */
        .sidebar {
            width: 220px; background: var(--panel); border-right: 1px solid var(--border);
            padding: 20px; display: flex; flex-direction: column;
        }

        .logo { color: white; font-weight: 800; letter-spacing: 4px; margin-bottom: 30px; }

        /* Main Workspace */
        .workspace { flex: 1; display: grid; grid-template-columns: 1fr 350px; }
        .editor { padding: 30px; border-right: 1px solid var(--border); overflow-y: auto; }
        .inspector { padding: 20px; background: var(--bg); overflow-y: auto; }

        /* Components */
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; border-radius: 2px; }
        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #444; margin-bottom: 10px; display: block; }

        .drop-zone {
            border: 1px solid var(--border); height: 350px; display: flex;
            align-items: center; justify-content: center; background: #000;
            cursor: pointer; position: relative; transition: 0.2s;
        }
        .drop-zone:hover { border-color: var(--text); }
        #preview { max-width: 100%; max-height: 100%; display: none; }

        .btn {
            background: transparent; border: 1px solid var(--border); color: var(--text-bright);
            padding: 10px; width: 100%; cursor: pointer; text-transform: uppercase;
            font-size: 10px; font-weight: 600; margin-top: 10px; transition: 0.2s;
        }
        .btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .btn.primary { background: var(--accent); color: var(--bg); }

        /* Intelligence Feed */
        .feed { font-family: 'SF Mono', monospace; font-size: 11px; line-height: 1.5; }
        .entry { margin-bottom: 8px; border-left: 1px solid #222; padding-left: 10px; }
        .ts { color: #333; margin-right: 10px; }
        .meta-tag { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">SLOANE</div>
    <div class="label">Operations</div>
    <div style="color:white; margin-bottom:20px;">IMAGE_INTEL_V4</div>
    <div class="label">System</div>
    <p>Node: Cloud_Proxy_01<br>Status: Optimal</p>
</aside>

<div class="workspace">
    <div class="editor">
        <div class="panel">
            <span class="label">Ingestion Engine</span>
            <div class="drop-zone" id="dropZone">
                <span id="dropText">AWAITING SOURCE MATERIAL...</span>
                <input type="file" id="fileInput" hidden accept="image/*">
                <img id="preview">
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn primary" onclick="startAI()">Execute Restoration</button>
                <button class="btn" onclick="extractMeta()">Analyze Metadata</button>
            </div>
        </div>

        <div class="panel">
            <span class="label">Advanced Search Bridges</span>
            <input type="text" id="target" placeholder="NAME / PSEUDO / UID" 
                   style="width:100%; background:black; border:1px solid var(--border); color:white; padding:10px; margin-bottom:10px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn" onclick="biometricSearch()">FaceCheck / Yandex</button>
                <button class="btn" onclick="osint('social')">Social Graph</button>
            </div>
        </div>
    </div>

    <div class="inspector">
        <span class="label">Intelligence Feed</span>
        <div class="feed" id="feed">
            <div class="entry"><span class="ts">13:00:00</span> [SYSTEM] Sloane core online. Encryption active.</div>
        </div>
    </div>
</div>

<script>
    const feed = document.getElementById('feed');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');

    function push(msg) {
        const time = new Date().toLocaleTimeString();
        feed.innerHTML = `<div class="entry"><span class="ts">${time}</span> ${msg}</div>` + feed.innerHTML;
    }

    // Gestion de l'Image
    document.getElementById('dropZone').onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                preview.src = ev.target.result;
                preview.style.display = 'block';
                document.getElementById('dropText').style.display = 'none';
                push(`[FILE] Ingested: <span class="meta-tag">${file.name}</span>`);
                push(`[INFO] Size: ${(file.size / 1024).toFixed(2)} KB`);
            };
            reader.readAsDataURL(file);
        }
    };

    // Analyse de Métadonnées (Simplifiée pour HTML)
    function extractMeta() {
        if (!preview.src) return push("[ERROR] No source material found.");
        push("[SYSTEM] Scanning EXIF/XMP metadata headers...");
        setTimeout(() => {
            push("[META] Device: Unknown / Stripped");
            push("[META] GPS: No coordinates found.");
            push("[INFO] Image appears to be processed or from web source.");
        }, 800);
    }

    // Recherche Biométrique réelle (Ponts OSINT)
    function biometricSearch() {
        push("[OSINT] Launching biometric recognition sequence...");
        push("[REDIRECT] Initializing Yandex Visual Search & FaceCheck ID...");
        // Ouvre les deux meilleurs outils au monde pour l'identification réelle
        window.open('https://yandex.com/images/search?rpt=imageview', '_blank');
        window.open('https://facecheck.id/', '_blank');
        push("[ALERT] Manual upload required on destination bridges.");
    }

    function osint(mode) {
        const query = document.getElementById('target').value;
        if (!query) return push("[ERROR] Target identifier required.");
        push(`[QUERY] Running Social Graph for: ${query}`);
        window.open(`https://www.google.com/search?q=site:instagram.com+OR+site:facebook.com+OR+site:twitter.com+"${query}"`, '_blank');
    }

    // IA Restoration (Préparation API)
    function startAI() {
        push("[NEURAL] Connecting to Cloud GPU cluster...");
        push("[AUTH] Token required. Please configure API_KEY in settings.");
    }
</script>

</body>
</html>
